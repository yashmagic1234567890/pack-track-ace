spring:
  application:
    name: freshtrack-backend

  # ---------------------------------------------------------------------------
  # Default profile uses MySQL. Override via environment variables or the
  # `h2` profile (set SPRING_PROFILES_ACTIVE=h2) for a zero-setup local run.
  # ---------------------------------------------------------------------------
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/freshtrack?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  sql:
    init:
      mode: never   # set to "always" to load schema.sql/data.sql on startup

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# ---------------------------------------------------------------------------
# Application-specific configuration
# ---------------------------------------------------------------------------
app:
  jwt:
    # IMPORTANT: override this secret in production (env: APP_JWT_SECRET).
    secret: ${APP_JWT_SECRET:ZmreshTrackSuperSecretKeyForJwtSigning_ChangeMeInProduction_2024!!}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}   # 24 hours
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

logging:
  level:
    com.freshtrack: INFO
    org.springframework.security: WARN
